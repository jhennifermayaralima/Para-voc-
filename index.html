<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Para você 🐱💛</title>

<style>
body {
    background: #ffeef2;
    font-family: Arial, sans-serif;
    text-align: center;
    padding: 30px;
}

.box {
    background: white;
    padding: 25px;
    border-radius: 20px;
    box-shadow: 0 0 15px rgba(0,0,0,0.1);
    display: inline-block;
    max-width: 400px;
}

h2 {
    color: #ff4d6d;
}

button {
    margin-top: 20px;
    padding: 10px 20px;
    border: none;
    background: #ff4d6d;
    color: white;
    border-radius: 10px;
    cursor: pointer;
}

.frase {
    opacity: 0;
    transition: 1s;
    margin-top: 15px;
}

.gato {
    width: 120px;
    margin: 10px;
    opacity: 0;
    transform: scale(0.8);
    transition: 0.8s;
    border-radius: 15px;
}

#presenteBtn {
    display: none;
    margin-top: 20px;
    background: #ff85a2;
}

#mensagemFinal {
    opacity: 0;
    transition: 1s;
    margin-top: 15px;
    font-weight: bold;
}
</style>

</head>

<body>

<div class="box">
    <h2>
        Oi meu bem, novo recado para você 🐱💛
    </h2>

    <button onclick="mostrar()">Clica aqui 🐾</button>

    <div id="conteudo"></div>

    <button id="presenteBtn" onclick="mostrarPresente()">🎁 Presente pra você</button>

    <p id="mensagemFinal">Vale beijinhos e carinho 💛</p>
</div>

<script>
let mensagens = [
"Sei que os últimos dias não estão tão bons, mas saiba que pode contar comigo 🥰",
"Você continua incrível e tudo bem ter dias não tão bons, respira fundo 😮‍💨",
"Espero que esse recadinho faça um pouco de diferença, assim como você faz diferença nos meus dias 🥰"
];

let gatos = [
"gatinho1.jpeg",
"gatinho2.jpeg"
];

function mostrar() {
    let div = document.getElementById("conteudo");
    div.innerHTML = "";

    mensagens.forEach((texto, i) => {
        let p = document.createElement("p");
        p.className = "frase";
        p.innerText = texto;
        div.appendChild(p);

        setTimeout(() => {
            p.style.opacity = 1;
        }, i * 1800);
    });

    gatos.forEach((src, i) => {
        let img = document.createElement("img");
        img.src = src;
        img.className = "gato";
        div.appendChild(img);

        setTimeout(() => {
            img.style.opacity = 1;
            img.style.transform = "scale(1)";
        }, (mensagens.length * 1800) + (i * 800));
    });

    setTimeout(() => {
        document.getElementById("presenteBtn").style.display = "inline-block";
    }, (mensagens.length * 1800) + (gatos.length * 800) + 500);
}

function mostrarPresente() {
    let msg = document.getElementById("mensagemFinal");
    msg.style.opacity = 1;
}
</script>

</body>
</html>
